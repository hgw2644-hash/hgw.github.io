<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To. 밍서에게</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #efe3d3, #f8f1e7, #e8d8c3);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: #4b3d33;
      padding: 20px;
    }

    .bg-glow {
      position: absolute;
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(255,255,255,0.35), rgba(255,255,255,0));
      border-radius: 50%;
      filter: blur(10px);
      animation: floatGlow 6s ease-in-out infinite;
    }

    .bg-glow.one {
      top: 5%;
      left: 8%;
    }

    .bg-glow.two {
      bottom: 8%;
      right: 6%;
      animation-delay: 2s;
    }

    @keyframes floatGlow {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-15px) scale(1.05); }
    }

    .card {
      position: relative;
      z-index: 2;
      background: rgba(255, 250, 244, 0.88);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 28px;
      padding: 42px 30px 34px;
      max-width: 470px;
      width: 100%;
      text-align: center;
      box-shadow: 0 14px 40px rgba(95, 72, 53, 0.18);
    }

    .small {
      font-size: 14px;
      letter-spacing: 2px;
      color: #9a7d67;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 30px;
      color: #7b5d49;
    }

    p {
      margin: 0;
      font-size: 17px;
      line-height: 1.9;
      white-space: pre-line;
      color: #5a473a;
    }

    .heart-line {
      margin: 18px 0 24px;
      font-size: 20px;
      color: #c78f7b;
    }

    .magic-btn {
      margin-top: 28px;
      padding: 14px 24px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #c99b7a, #b78463, #d4a684);
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(183, 132, 99, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .magic-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 14px 28px rgba(183, 132, 99, 0.42);
    }

    .magic-btn:active {
      transform: scale(0.98);
    }

    .message-wrap {
      position: relative;
      height: 110px;
      margin-top: 16px;
      overflow: visible;
    }

    .love-message {
      opacity: 0;
      transform: translateY(20px) scale(0.8);
      transition: all 0.9s ease;
      font-size: 34px;
      font-weight: 800;
      color: #b66b5f;
      text-shadow: 0 0 12px rgba(255,255,255,0.7);
      pointer-events: none;
    }

    .love-message.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .sub-message {
      margin-top: 8px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 1s ease 0.25s;
      font-size: 16px;
      color: #8c6957;
      pointer-events: none;
    }

    .sub-message.show {
      opacity: 1;
      transform: translateY(0);
    }

    .floating-heart {
      position: absolute;
      font-size: 22px;
      opacity: 0;
      animation: floatHeart 2.4s ease-out forwards;
      pointer-events: none;
    }

    @keyframes floatHeart {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.5) rotate(0deg);
      }
      20% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(-120px) scale(1.4) rotate(25deg);
      }
    }

    .sparkle {
      position: absolute;
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.95);
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(255,255,255,0.95);
      opacity: 0;
      animation: sparkleAnim 1.6s ease-out forwards;
      pointer-events: none;
    }

    @keyframes sparkleAnim {
      0% {
        opacity: 0;
        transform: scale(0.2);
      }
      30% {
        opacity: 1;
        transform: scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-30px) scale(0.3);
      }
    }

    @media (max-width: 480px) {
      .card {
        padding: 34px 22px 28px;
      }

      h1 {
        font-size: 26px;
      }

      p {
        font-size: 16px;
      }

      .love-message {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow one"></div>
  <div class="bg-glow two"></div>

  <div class="card">
    <div class="small">FOR MINGSEO</div>
    <h1>To. 밍서에게</h1>

    <p>
우리 벌써 1년 만났네.
나는 시간이 정말 금방 가는 것 같아.

민서랑 같이 있으면 항상 너무 편하고 좋고,
지난 1년 동안 정말 즐겁고 행복했어.

이제 우리 2년 차도 예쁘게 시작하자 ㅎㅎ
항상 고맙고, 많이 아끼고, 사랑해.
    </p>

    <div class="heart-line">🤍 🤎 🤍</div>

    <button class="magic-btn" onclick="showLove()">
      우리의 1년 열어보기
    </button>

    <div class="message-wrap" id="effectArea">
      <div class="love-message" id="loveMsg">사랑해, 밍서야 ❤️</div>
      <div class="sub-message" id="subMsg">앞으로도 우리 오래오래 행복하자</div>
    </div>
  </div>

  <script>
    function showLove() {
      const loveMsg = document.getElementById('loveMsg');
      const subMsg = document.getElementById('subMsg');
      const effectArea = document.getElementById('effectArea');

      loveMsg.classList.remove('show');
      subMsg.classList.remove('show');

      void loveMsg.offsetWidth;

      loveMsg.classList.add('show');
      subMsg.classList.add('show');

      for (let i = 0; i < 14; i++) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.innerText = ['❤️', '🤍', '✨', '💕'][Math.floor(Math.random() * 4)];
        heart.style.left = Math.random() * 90 + '%';
        heart.style.top = '65px';
        heart.style.animationDelay = (Math.random() * 0.5) + 's';
        heart.style.fontSize = (18 + Math.random() * 12) + 'px';
        effectArea.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 2600);
      }

      for (let i = 0; i < 18; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = Math.random() * 100 + '%';
        sparkle.style.top = (20 + Math.random() * 70) + 'px';
        sparkle.style.animationDelay = (Math.random() * 0.4) + 's';
        effectArea.appendChild(sparkle);

        setTimeout(() => {
          sparkle.remove();
        }, 1800);
      }
    }
  </script>
</body>
</html>
